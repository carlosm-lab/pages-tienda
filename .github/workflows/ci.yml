name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint
      
    - name: Build
      run: npm run build
      env:
        # Vite will enforce these are present due to vite.config.js validation
        VITE_SUPABASE_URL: "https://placeholder-url-for-ci.supabase.co"
        VITE_SUPABASE_ANON_KEY: "placeholder_key"
        VITE_WHATSAPP_NUMBER: "12345678"
        VITE_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
